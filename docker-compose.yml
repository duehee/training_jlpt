services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jlpt_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jlpt_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jlpt_password}
      POSTGRES_DB: ${POSTGRES_DB:-jlpt_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jlpt_user} -d ${POSTGRES_DB:-jlpt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jlpt_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: