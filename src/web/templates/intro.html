{% extends "base.html" %}
{% block content %}
<div style="padding-top:36px">
  <div style="font-size:13px;font-weight:700;color:#2f55d4;letter-spacing:.04em;margin-bottom:16px">AI 일본어 진단</div>
  <h1 style="font-size:40px;line-height:1.25;font-weight:800;letter-spacing:-.03em;margin:0 0 18px">5분 진단으로<br>내 약점 문법을 찾아보세요</h1>
  <p style="font-size:16px;line-height:1.7;color:#5b616b;margin:0 0 36px;max-width:520px">총 10문항(N5·N4)을 풀면 AI가 채점하고, 약점 문법을 <strong style="color:#1a1c20;font-weight:700">검색된 근거와 함께</strong> 설명해드려요. 로그인 없이 바로 체험할 수 있어요.</p>

  <div style="display:flex;gap:12px;margin-bottom:40px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:12px 16px">
      <div style="width:24px;height:24px;border-radius:7px;background:#eaeefb;display:flex;align-items:center;justify-content:center;color:#2f55d4;font-weight:700;font-size:13px">10</div>
      <span style="font-size:14px;font-weight:600;color:#3a3f48">진단 문항</span>
    </div>
    <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:12px 16px">
      <div style="width:24px;height:24px;border-radius:7px;background:#e7f6ef;display:flex;align-items:center;justify-content:center;color:#0f9d6b;font-weight:700;font-size:12px">AI</div>
      <span style="font-size:14px;font-weight:600;color:#3a3f48">자동 채점</span>
    </div>
    <div style="display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e2e5ea;border-radius:12px;padding:12px 16px">
      <div style="width:24px;height:24px;border-radius:7px;background:#fbf0df;display:flex;align-items:center;justify-content:center;color:#d98324;font-weight:700;font-size:13px">⌕</div>
      <span style="font-size:14px;font-weight:600;color:#3a3f48">근거 기반 설명</span>
    </div>
  </div>

  <a href="/quiz" style="display:inline-flex;align-items:center;gap:10px;background:#2f55d4;color:#fff;font-size:16px;font-weight:700;padding:16px 30px;border-radius:14px;box-shadow:0 8px 20px -8px rgba(47,85,212,.6)">
    진단 시작
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </a>
  <div style="font-size:12px;color:#9298a2;margin-top:16px">익명 세션이 자동으로 발급됩니다 · 약 5분 소요</div>
</div>
{% endblock %}
